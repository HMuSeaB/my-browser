name: windows-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Build app
        run: wails build -clean -f

      - name: Prepare release artifacts
        shell: pwsh
        run: .\scripts\package-portable.ps1 -Version "${{ github.ref_name }}" -ExePath ".\build\bin\my-browser.exe" -OutputDir ".\release-artifacts"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-browser-${{ github.ref_name }}-windows
          path: release-artifacts/*

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/my-browser.exe
            release-artifacts/my-browser-portable-${{ github.ref_name }}.zip
          generate_release_notes: true
